name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apks:
    name: Build Android APKs
    runs-on: ubuntu-latest
    env:
      NULLXOID_SIGNING_KEYSTORE_BASE64: ${{ secrets.NULLXOID_SIGNING_KEYSTORE_BASE64 }}
      NULLXOID_SIGNING_STORE_PASSWORD: ${{ secrets.NULLXOID_SIGNING_STORE_PASSWORD }}
      NULLXOID_SIGNING_KEY_ALIAS: ${{ secrets.NULLXOID_SIGNING_KEY_ALIAS }}
      NULLXOID_SIGNING_KEY_PASSWORD: ${{ secrets.NULLXOID_SIGNING_KEY_PASSWORD }}
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version from CI
        run: |
          echo "APP_VERSION_CODE=${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "APP_VERSION_NAME=0.1.${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Configure update APK signing
        if: env.NULLXOID_SIGNING_KEYSTORE_BASE64 != ''
        run: |
          echo "$NULLXOID_SIGNING_KEYSTORE_BASE64" | base64 --decode > app/nullxoid-update.jks
          echo "NULLXOID_SIGNING_STORE_FILE=$PWD/app/nullxoid-update.jks" >> "$GITHUB_ENV"

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename debug APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/NullXoidAndroid-debug.apk

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: NullXoidAndroid-debug-apk
          path: release/NullXoidAndroid-debug.apk

      - name: Publish Forgejo releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          token="${FORGEJO_TOKEN:-${GITHUB_TOKEN:-}}"
          if [ -z "$token" ]; then
            echo "No Forgejo Actions token is configured; skipping Forgejo release publication."
            exit 0
          fi

          api="${GITHUB_SERVER_URL%/}/api/v1/repos/${GITHUB_REPOSITORY}"
          apk="release/NullXoidAndroid-debug.apk"

          json_field() {
            python3 -c 'import json,sys; print(json.load(sys.stdin).get(sys.argv[1], ""))' "$1"
          }

          asset_id_for() {
            python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          target = sys.argv[1]
          for asset in data.get("assets", []):
              if asset.get("name") == target:
                  print(asset.get("id", ""))
                  break
          ' "$1"
          }

          publish_release() {
            tag="$1"
            name="$2"
            body="$3"

            response="$(curl -fsS \
              -H "Authorization: token ${token}" \
              -H "Accept: application/json" \
              "${api}/releases/tags/${tag}" || true)"

            if [ -z "$response" ]; then
              payload="$(TAG="$tag" NAME="$name" BODY="$body" python3 - <<'PY'
          import json
          import os

          print(json.dumps({
              "tag_name": os.environ["TAG"],
              "target_commitish": os.environ.get("GITHUB_SHA", ""),
              "name": os.environ["NAME"],
              "body": os.environ["BODY"],
              "draft": False,
              "prerelease": True,
          }))
          PY
          )"
              response="$(curl -fsS -X POST \
                -H "Authorization: token ${token}" \
                -H "Accept: application/json" \
                -H "Content-Type: application/json" \
                -d "$payload" \
                "${api}/releases")"
            fi

            release_id="$(printf '%s' "$response" | json_field id)"
            if [ -z "$release_id" ]; then
              echo "Could not resolve release id for ${tag}" >&2
              exit 1
            fi

            asset_id="$(printf '%s' "$response" | asset_id_for "NullXoidAndroid-debug.apk")"
            if [ -n "$asset_id" ]; then
              curl -fsS -X DELETE \
                -H "Authorization: token ${token}" \
                -H "Accept: application/json" \
                "${api}/releases/assets/${asset_id}"
            fi

            curl -fsS -X POST \
              -H "Authorization: token ${token}" \
              -H "Accept: application/json" \
              -F "attachment=@${apk}" \
              "${api}/releases/${release_id}/assets?name=NullXoidAndroid-debug.apk" \
              >/dev/null
          }

          version_tag="v0.1.${GITHUB_RUN_NUMBER}"
          publish_release "$version_tag" "Version ${GITHUB_RUN_NUMBER}" \
            "Automated Forgejo debug APK release for ${GITHUB_SHA}."
          publish_release "latest-debug" "Latest Debug APK" \
            "Moving Forgejo debug APK pointer for the latest main build."
