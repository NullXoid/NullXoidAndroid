name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apks:
    name: Build Android APKs
    runs-on: ubuntu-latest
    env:
      NULLXOID_SIGNING_KEYSTORE_BASE64: ${{ secrets.NULLXOID_SIGNING_KEYSTORE_BASE64 }}
      NULLXOID_SIGNING_STORE_PASSWORD: ${{ secrets.NULLXOID_SIGNING_STORE_PASSWORD }}
      NULLXOID_SIGNING_KEY_ALIAS: ${{ secrets.NULLXOID_SIGNING_KEY_ALIAS }}
      NULLXOID_SIGNING_KEY_PASSWORD: ${{ secrets.NULLXOID_SIGNING_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version from CI
        run: |
          echo "APP_VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "APP_VERSION_NAME=0.1.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Configure update APK signing
        if: env.NULLXOID_SIGNING_KEYSTORE_BASE64 != ''
        run: |
          echo "$NULLXOID_SIGNING_KEYSTORE_BASE64" | base64 --decode > app/nullxoid-update.jks
          echo "NULLXOID_SIGNING_STORE_FILE=$PWD/app/nullxoid-update.jks" >> "$GITHUB_ENV"

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename debug APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/NullXoidAndroid-debug.apk

      - name: Publish versioned release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: v0.1.${{ github.run_number }}
          name: Version ${{ github.run_number }}
          artifacts: release/NullXoidAndroid-debug.apk
          prerelease: true

      - name: Publish latest debug
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest-debug
          name: Latest Debug APK
          artifacts: release/NullXoidAndroid-debug.apk
          allowUpdates: true
          replacesArtifacts: true
          prerelease: true
