name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APK for team download
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/NullXoidAndroid-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NullXoidAndroid-debug-apk
          path: release/NullXoidAndroid-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish latest debug APK release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest-debug
          name: Latest Debug APK
          body: |
            Auto-built debug APK from the latest commit on main.

            This is for internal app-team testing only.
          artifacts: release/NullXoidAndroid-debug.apk
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          prerelease: true
          makeLatest: false
